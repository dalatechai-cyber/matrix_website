name: Register QPay Merchant

on:
  workflow_dispatch:

jobs:
  register-merchant:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run createMerchant.js
        env:
          QPAY_USERNAME: ${{ secrets.QPAY_USERNAME }}
          QPAY_PASSWORD: ${{ secrets.QPAY_PASSWORD }}
        run: node createMerchant.js
