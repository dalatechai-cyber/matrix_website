    <style>
      /* ── shared ──────────────────────────────────────────────── */
      .gallery-section { padding: 4rem 0 5rem; }

      .gallery-columns {
        display: flex;
        gap: 2.5rem;
        align-items: flex-start;
        margin-top: 2.5rem;
        overflow-x: hidden;
      }

      .gallery-block {
        flex: 1;
        min-width: 0;
      }

      .gallery-block-title {
        text-align: center;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        margin-bottom: 1.4rem;
      }
      .gallery-block-title::after {
        content: '';
        display: block;
        width: 2rem;
        height: 3px;
        background: var(--accent, #64d39a);
        margin: .4rem auto 0;
        border-radius: 2px;
      }

      .gallery-slider {
        width: 100%;
        overflow: hidden;
        position: relative;
        border-radius: 14px;
        touch-action: pan-y;
        user-select: none;
        -webkit-user-select: none;
      }

      .gallery-track {
        display: flex;
        transition: transform .45s cubic-bezier(.22, 1, .36, 1);
        will-change: transform;
      }

      /* Desktop: images keep natural portrait aspect ratio */
      .gallery-slider img {
        aspect-ratio: 3 / 4;
        width: 100%;
        object-fit: cover;
        display: block;
        flex-shrink: 0;
        border-radius: 11px;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .prev, .next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0,0,0,.52);
        color: #fff;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.45rem;
        line-height: 1;
        cursor: pointer;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: background .2s, box-shadow .2s;
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .prev:hover, .next:hover {
        background: rgba(0,0,0,.84);
        box-shadow: 0 0 10px rgba(100,211,154,.45);
      }
      .prev { left: 10px; }
      .next { right: 10px; }

      .gallery-dots {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 14px;
      }
      .gallery-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
        border: none;
        padding: 0;
        cursor: pointer;
        transition: background .25s, transform .25s;
      }
      .gallery-dot.active {
        background: var(--accent, #64d39a);
        transform: scale(1.45);
      }

      /* ── mobile only: stack vertically, fix image size ────────── */
      @media (max-width: 680px) {
        .gallery-section { padding: 3rem 0 4rem; }

        .gallery-columns {
          flex-direction: column;
          gap: 3rem;
        }

        .gallery-block {
          flex: unset;
          width: 100%;
        }

        .gallery-slider {
          max-width: 500px;
          margin: 0 auto;
        }

        /* Fixed height prevents images from blowing up on narrow screens */
        .gallery-slider img {
          aspect-ratio: unset;
          height: 350px;
        }

        .prev { left: 6px; width: 44px; height: 44px; font-size: 1.6rem; }
        .next { right: 6px; width: 44px; height: 44px; font-size: 1.6rem; }
      }
    </style>

    <style>
      #matrix-chat-toggle {
        position:fixed;bottom:20px;right:20px;z-index:99999;
        width:80px;height:80px;border-radius:50%;background:#000;
        border:2px solid #333;box-shadow:0 4px 12px rgba(0,0,0,.5);
        cursor:pointer;overflow:hidden;padding:0;
        transition:all .3s ease;display:flex;align-items:center;justify-content:center;
      }
      #matrix-chatbot-container {
        position:fixed;bottom:100px;right:20px;width:400px;height:600px;
        max-height:80vh;background:#1F1F1F;border-radius:16px;
        box-shadow:0 5px 40px rgba(0,0,0,.6);z-index:99999;
        overflow:hidden;border:1px solid #333;
      }
      #matrix-chat-toggle:hover { transform:scale(1.1);box-shadow:0 0 15px rgba(100,211,154,.6);border-color:#64d39a; }
      #matrix-chat-toggle.is-open { transform:rotate(45deg);border-color:#64d39a; }
      #matrix-chat-toggle.is-open:hover { transform:rotate(45deg) scale(1.1); }
      @media(max-width:480px){
        #matrix-chatbot-container{width:calc(100% - 32px)!important;height:70vh!important;bottom:100px!important;right:16px!important;}
      }
    </style>
    <script>
      (function(){
        var c=document.getElementById('matrix-chatbot-container');
        var b=document.getElementById('matrix-chat-toggle');
        if(!c||!b)return;
        b.addEventListener('click',function(){
          var hidden=c.style.display==='none'||c.style.display==='';
          c.style.display=hidden?'block':'none';
          b.classList.toggle('is-open',hidden);
          b.setAttribute('aria-expanded',hidden?'true':'false');
        });
      })();
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.gallery-slider').forEach(function (slider) {
          var track  = slider.querySelector('.gallery-track');
          var images = Array.from(track.querySelectorAll('img'));
          var count  = images.length;
          var dots   = slider.closest('.gallery-block').querySelector('.gallery-dots');
          var idx    = 0;

          for (var d = 0; d < count; d++) {
            var dot = document.createElement('button');
            dot.className = 'gallery-dot' + (d === 0 ? ' active' : '');
            dot.setAttribute('aria-label', (d + 1) + '-р зураг');
            (function (i) { dot.addEventListener('click', function () { idx = i; render(); }); })(d);
            dots.appendChild(dot);
          }

          function render() {
            var W = slider.offsetWidth;
            images.forEach(function (img) {
              img.style.width    = W + 'px';
              img.style.minWidth = W + 'px';
            });
            track.style.transform = 'translateX(' + (-idx * W) + 'px)';
            dots.querySelectorAll('.gallery-dot').forEach(function (dot, i) {
              dot.classList.toggle('active', i === idx);
            });
          }

          slider.querySelector('.prev').addEventListener('click', function () {
            idx = (idx - 1 + count) % count; render();
          });
          slider.querySelector('.next').addEventListener('click', function () {
            idx = (idx + 1) % count; render();
          });

          var touchX = 0;
          var touchY = 0;
          slider.addEventListener('touchstart', function (e) {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
          }, { passive: true });
          slider.addEventListener('touchmove', function (e) {
            var dx = e.touches[0].clientX - touchX;
            var dy = e.touches[0].clientY - touchY;
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 5) { e.preventDefault(); }
          }, { passive: false });
          slider.addEventListener('touchend', function (e) {
            var dx = e.changedTouches[0].clientX - touchX;
            if (Math.abs(dx) > 40) { idx = dx < 0 ? (idx + 1) % count : (idx - 1 + count) % count; render(); }
          });

          render();
          window.addEventListener('resize', render);
        });
      });
    </script>
