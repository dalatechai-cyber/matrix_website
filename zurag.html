    <style>
      .gallery-section { padding: 4rem 0 5rem; }

      .gallery-columns {
        display: flex;
        gap: 2.5rem;
        align-items: flex-start;
        margin-top: 2.5rem;
      }

      .gallery-column { flex: 1; min-width: 0; }

      .gallery-col-title {
        text-align: center;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: .12em;
        text-transform: uppercase;
        margin-bottom: 1.4rem;
      }
      .gallery-col-title::after {
        content: '';
        display: block;
        width: 2rem;
        height: 3px;
        background: var(--accent, #64d39a);
        margin: .4rem auto 0;
        border-radius: 2px;
      }

      .carousel-wrapper {
        overflow: hidden;
        position: relative;
        width: 100%;
        border-radius: 14px;
      }

      .carousel-track {
        display: flex;
        align-items: center;
        transition: transform .45s cubic-bezier(.22, 1, .36, 1);
        will-change: transform;
      }

      .carousel-card {
        flex-shrink: 0;
        transition: filter .4s ease, opacity .4s ease, transform .4s ease;
        filter: blur(5px);
        opacity: .42;
        transform: scale(.93);
      }

      .carousel-card.active {
        filter: none;
        opacity: 1;
        transform: scale(1);
      }

      .carousel-card img {
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 11px;
        display: block;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .carousel-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0,0,0,.52);
        color: #fff;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.45rem;
        line-height: 1;
        cursor: pointer;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition: background .2s, box-shadow .2s;
      }
      .carousel-btn:hover {
        background: rgba(0,0,0,.84);
        box-shadow: 0 0 10px rgba(100,211,154,.45);
      }
      .carousel-btn.prev-btn { left: 10px; }
      .carousel-btn.next-btn { right: 10px; }

      .carousel-dots {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 14px;
      }
      .carousel-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
        border: none;
        padding: 0;
        cursor: pointer;
        transition: background .25s, transform .25s;
      }
      .carousel-dot.active {
        background: var(--accent, #64d39a);
        transform: scale(1.45);
      }

      @media (max-width: 680px) {
        .gallery-columns { flex-direction: column; gap: 3rem; }
      }
    </style>

    <style>
      #matrix-chat-toggle {
        position:fixed;bottom:20px;right:20px;z-index:99999;
        width:80px;height:80px;border-radius:50%;background:#000;
        border:2px solid #333;box-shadow:0 4px 12px rgba(0,0,0,.5);
        cursor:pointer;overflow:hidden;padding:0;
        transition:all .3s ease;display:flex;align-items:center;justify-content:center;
      }
      #matrix-chatbot-container {
        position:fixed;bottom:100px;right:20px;width:400px;height:600px;
        max-height:80vh;background:#1F1F1F;border-radius:16px;
        box-shadow:0 5px 40px rgba(0,0,0,.6);z-index:99999;
        overflow:hidden;border:1px solid #333;
      }
      #matrix-chat-toggle:hover { transform:scale(1.1);box-shadow:0 0 15px rgba(100,211,154,.6);border-color:#64d39a; }
      #matrix-chat-toggle.is-open { transform:rotate(45deg);border-color:#64d39a; }
      #matrix-chat-toggle.is-open:hover { transform:rotate(45deg) scale(1.1); }
      @media(max-width:480px){
        #matrix-chatbot-container{width:calc(100% - 32px)!important;height:70vh!important;bottom:100px!important;right:16px!important;}
      }
    </style>
    <script>
      (function(){
        var c=document.getElementById('matrix-chatbot-container');
        var b=document.getElementById('matrix-chat-toggle');
        if(!c||!b)return;
        b.addEventListener('click',function(){
          var hidden=c.style.display==='none'||c.style.display==='';
          c.style.display=hidden?'block':'none';
          b.classList.toggle('is-open',hidden);
          b.setAttribute('aria-expanded',hidden?'true':'false');
        });
      })();
    </script>

    <script>
      function setupCarousel(wrapId, trackId, dotsId, count) {
        var idx     = 0;
        var wrapper = document.getElementById(wrapId);
        var track   = document.getElementById(trackId);
        var dotsEl  = document.getElementById(dotsId);
        var cards   = Array.prototype.slice.call(track.querySelectorAll('.carousel-card'));

        for (var d = 0; d < count; d++) {
          var dot = document.createElement('button');
          dot.className = 'carousel-dot' + (d === 0 ? ' active' : '');
          dot.setAttribute('aria-label', (d + 1) + '-р зураг');
          (function(i){ dot.addEventListener('click', function(){ idx=i; render(); }); })(d);
          dotsEl.appendChild(dot);
        }

        function render() {
          var W     = wrapper.offsetWidth;
          var cardW = Math.round(W * 0.74);
          var gap   = 12;
          var halfG = gap / 2;
          var slot  = cardW + gap;
          var tx    = (W - cardW) / 2 - halfG - idx * slot;

          cards.forEach(function(card, i) {
            card.style.width       = cardW + 'px';
            card.style.marginLeft  = halfG + 'px';
            card.style.marginRight = halfG + 'px';
            card.classList.toggle('active', i === idx);
          });

          track.style.transform = 'translateX(' + tx + 'px)';

          dotsEl.querySelectorAll('.carousel-dot').forEach(function(dot, i){
            dot.classList.toggle('active', i === idx);
          });
        }

        wrapper.querySelector('.prev-btn').addEventListener('click', function(){
          idx = (idx - 1 + count) % count; render();
        });
        wrapper.querySelector('.next-btn').addEventListener('click', function(){
          idx = (idx + 1) % count; render();
        });

        var touchX = 0;
        wrapper.addEventListener('touchstart', function(e){ touchX = e.touches[0].clientX; }, {passive:true});
        wrapper.addEventListener('touchend', function(e){
          var dx = e.changedTouches[0].clientX - touchX;
          if (Math.abs(dx) > 40) { idx = dx < 0 ? (idx+1)%count : (idx-1+count)%count; render(); }
        });

        render();
        window.addEventListener('resize', render);
      }

      document.addEventListener('DOMContentLoaded', function(){
        setupCarousel('male-carousel',   'male-track',   'male-dots',   9);
        setupCarousel('female-carousel', 'female-track', 'female-dots', 10);
      });
    </script>
